<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – VibeStore</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <h2>Join VibeStore 🎶</h2>
    <p>Create your account and start discovering music</p>

    <form onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="[name]" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-violet">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  if (getUser()) window.location.href = 'profile.html';

  function handleSignup(e) {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    localStorage.setItem('user', JSON.stringify({ name, email }));
    window.location.href = 'profile.html';
  }
</script>
</body>
</html>
