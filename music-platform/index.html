<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeStore – Digital Music</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav>
  <a href="index.html" class="logo">Vibe<span>Store</span></a>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Browse</a>
    <a href="login.html" id="nav-login">Login</a>
    <a href="profile.html" id="nav-profile" style="display:none">Profile</a>
    <a href="#" id="nav-logout" style="display:none" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="hero">
  <h1>🎵 Discover & Own Your Music</h1>
  <p>Browse thousands of tracks. Preview, like, and buy in one click.</p>
  <a href="login.html" class="btn btn-primary" id="hero-cta">Get Started</a>
</div>

<div class="section">
  <div class="section-title">🔥 Trending Now</div>
  <div class="song-grid" id="trending-grid"></div>
</div>

<div class="section">
  <div class="section-title">🎸 All Songs</div>
  <div class="song-grid" id="all-grid"></div>
</div>

<!-- Mini Player -->
<div class="mini-player" id="mini-player" style="display:none">
  <div class="player-info">
    <div class="player-icon" id="player-emoji">🎵</div>
    <div>
      <div class="player-title" id="player-title">Song Title</div>
      <div class="player-artist" id="player-artist">Artist</div>
    </div>
  </div>
  <div class="player-controls">
    <button title="Previous">⏮</button>
    <button title="Play/Pause">⏸</button>
    <button title="Next">⏭</button>
    <button title="Volume">🔊</button>
  </div>
</div>

<footer>© 2026 VibeStore. All rights reserved.</footer>

<script src="app.js"></script>
<script>
  const user = getUser();
  if (user) {
    document.getElementById('nav-login').style.display = 'none';
    document.getElementById('nav-profile').style.display = 'inline';
    document.getElementById('nav-logout').style.display = 'inline';
    document.getElementById('hero-cta').textContent = 'Go to Profile';
    document.getElementById('hero-cta').href = 'profile.html';
  }

  // Trending = first 4, All = all
  renderSongGrid('trending-grid', songs.slice(0, 4));
  renderSongGrid('all-grid', songs);
</script>
</body>
</html>
