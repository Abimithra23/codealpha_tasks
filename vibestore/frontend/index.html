<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeStore – Digital Music</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav>
  <a href="index.html" class="logo">Vibe<span>Store</span></a>
  <div class="nav-links">
    <a href="index.html">Browse</a>
    <a href="login.html" id="nav-login">Login</a>
    <a href="profile.html" id="nav-profile" style="display:none">Profile</a>
    <a href="#" id="nav-logout" style="display:none" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="hero">
  <h1>🎵 Discover & Own Your Music</h1>
  <p>Browse, preview, and purchase high-quality digital tracks.</p>
  <a href="login.html" class="btn btn-primary" id="hero-cta">Get Started Free</a>
</div>

<div class="section">
  <div class="section-title">🔥 Trending Now</div>
  <div class="song-grid" id="trending-grid"><p style="color:var(--muted)">Loading...</p></div>
</div>

<div class="section">
  <div class="section-title">🎸 All Songs</div>
  <div class="song-grid" id="all-grid"></div>
</div>

<!-- Mini Player -->
<div class="mini-player" id="mini-player">
  <div class="player-info">
    <div class="player-emoji" id="player-emoji">🎵</div>
    <div>
      <div class="player-title" id="player-title">—</div>
      <div class="player-artist" id="player-artist">—</div>
    </div>
  </div>
  <div class="progress-wrap">
    <span id="current-time">0:00</span>
    <div class="progress-bar" onclick="seekAudio(event, this)">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span id="duration">0:00</span>
  </div>
  <div class="player-controls">
    <button id="play-pause-btn" onclick="togglePlayPause()" title="Play/Pause">▶</button>
    <button onclick="if(currentAudio){currentAudio.currentTime=0;}" title="Restart">⏮</button>
    <button onclick="if(currentAudio){currentAudio.volume=currentAudio.volume>0?0:1;}" title="Mute">🔊</button>
  </div>
</div>

<div id="toast" class="toast"></div>
<footer>© 2026 VibeStore. All rights reserved.</footer>

<script src="app.js"></script>
<script>
  updateNav();
  const user = getUser();
  if (user) {
    document.getElementById('hero-cta').textContent = 'Go to Profile';
    document.getElementById('hero-cta').href = 'profile.html';
  }

  function seekAudio(e, bar) {
    if (!currentAudio || !currentAudio.duration) return;
    const rect = bar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    currentAudio.currentTime = pct * currentAudio.duration;
  }

  async function loadSongs() {
    try {
      const songs = await apiFetch('/songs');
      const profile = user ? await apiFetch('/profile').catch(() => ({ liked: [], fav: [] })) : { liked: [], fav: [] };
      renderSongGrid('trending-grid', songs.slice(0, 4), profile.liked, profile.fav);
      renderSongGrid('all-grid', songs, profile.liked, profile.fav);
    } catch (e) {
      document.getElementById('trending-grid').innerHTML = '<p style="color:red">Could not load songs. Is the server running?</p>';
    }
  }

  loadSongs();
</script>
</body>
</html>
