<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – VibeStore</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <h2>Welcome back 🎧</h2>
    <p>Sign in to access your music library</p>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-violet" id="submit-btn">Sign In</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up</a>
      &nbsp;|&nbsp; <a href="index.html">Browse</a>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script>
  if (getUser()) window.location.href = 'profile.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
    err.textContent = '';
    try {
      const data = await apiFetch('/login', {
        method: 'POST',
        body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
      });
      setAuth(data.token, data.user);
      const params = new URLSearchParams(window.location.search);
      if (params.get('redirect') === 'buy' && params.get('song')) {
        window.location.href = 'payment.html?song=' + params.get('song');
      } else {
        window.location.href = 'profile.html';
      }
    } catch (ex) {
      err.textContent = ex.message;
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
