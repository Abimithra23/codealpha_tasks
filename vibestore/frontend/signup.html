<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – VibeStore</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <h2>Join VibeStore 🎶</h2>
    <p>Create your account and start discovering music</p>
    <form id="signup-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required />
      </div>
      <button type="submit" class="btn btn-violet" id="submit-btn">Create Account</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
    <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>
<script src="app.js"></script>
<script>
  if (getUser()) window.location.href = 'profile.html';

  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
    err.textContent = '';
    try {
      const data = await apiFetch('/signup', {
        method: 'POST',
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      setAuth(data.token, data.user);
      window.location.href = 'profile.html';
    } catch (ex) {
      err.textContent = ex.message;
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
