<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile – VibeStore</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<nav>
  <a href="index.html" class="logo">Vibe<span>Store</span></a>
  <div class="nav-links">
    <a href="index.html">Browse</a>
    <a href="profile.html">Profile</a>
    <a href="#" onclick="logout()" class="btn-nav">Logout</a>
  </div>
</nav>

<div class="profile-header">
  <div class="profile-avatar">👤</div>
  <h2 id="profile-name">—</h2>
  <p id="profile-email">—</p>
</div>

<div class="section">
  <div class="tabs">
    <button class="tab-btn active" data-tab="liked" onclick="switchTab('liked')">♥ Liked</button>
    <button class="tab-btn" data-tab="fav" onclick="switchTab('fav')">★ Favourites</button>
    <button class="tab-btn" data-tab="recent" onclick="switchTab('recent')">🕐 Recently Played</button>
    <button class="tab-btn" data-tab="purchased" onclick="switchTab('purchased')">🎵 Purchased</button>
  </div>
  <div class="tab-content active" id="tab-liked"><div id="liked-list"><p class="empty-msg">Loading...</p></div></div>
  <div class="tab-content" id="tab-fav"><div id="fav-list"></div></div>
  <div class="tab-content" id="tab-recent"><div id="recent-list"></div></div>
  <div class="tab-content" id="tab-purchased"><div id="purchased-list"></div></div>
</div>

<!-- Mini Player -->
<div class="mini-player" id="mini-player">
  <div class="player-info">
    <div class="player-emoji" id="player-emoji">🎵</div>
    <div>
      <div class="player-title" id="player-title">—</div>
      <div class="player-artist" id="player-artist">—</div>
    </div>
  </div>
  <div class="progress-wrap">
    <span id="current-time">0:00</span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span id="duration">0:00</span>
  </div>
  <div class="player-controls">
    <button id="play-pause-btn" onclick="togglePlayPause()">▶</button>
    <button onclick="if(currentAudio){currentAudio.currentTime=0;}">⏮</button>
    <button onclick="if(currentAudio){currentAudio.volume=currentAudio.volume>0?0:1;}">🔊</button>
  </div>
</div>

<div id="toast" class="toast"></div>
<footer>© 2026 VibeStore. All rights reserved.</footer>

<script src="app.js"></script>
<script>
  if (!getUser()) window.location.href = 'login.html';
  const user = getUser();
  document.getElementById('profile-name').textContent = user.name;
  document.getElementById('profile-email').textContent = user.email;

  async function loadProfile() {
    try {
      const [profile, songs] = await Promise.all([apiFetch('/profile'), apiFetch('/songs')]);
      renderSongList('liked-list', profile.liked, songs);
      renderSongList('fav-list', profile.fav, songs);
      renderSongList('recent-list', profile.recent, songs);
      renderSongList('purchased-list', profile.purchased, songs);
    } catch (e) {
      document.getElementById('liked-list').innerHTML = '<p class="empty-msg">Could not load profile.</p>';
    }
  }
  loadProfile();
</script>
</body>
</html>
